services:
  app:
    build:
      context: .
    container_name: bavarian-robotaste-app
    env_file:
      - .env
    environment:
      PORT: 8080
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      REGISTRATION_URL: ${REGISTRATION_URL:-http://localhost:8080/register.html}
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  integration-lab:
    build:
      context: .
      dockerfile: Dockerfile.integration-lab
    container_name: bavarian-robotaste-integration-lab
    depends_on:
      - app
    ports:
      - "${INTEGRATION_LAB_PORT:-8001}:80"
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    container_name: bavarian-robotaste-caddy
    depends_on:
      - app
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
