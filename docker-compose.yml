services:
  web:
    build:
      context: .
    container_name: bavarian-robotaste-web
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  integration-lab:
    build:
      context: .
      dockerfile: Dockerfile.integration-lab
    container_name: bavarian-robotaste-integration-lab
    depends_on:
      - web
    ports:
      - "${INTEGRATION_LAB_PORT:-8001}:80"
    restart: unless-stopped
