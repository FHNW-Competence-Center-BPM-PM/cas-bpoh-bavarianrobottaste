<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bavarian RoboTaste | Menü</title>
    <meta
      name="description"
      content="Die Menükarte von Bavarian RoboTaste verbindet futuristische Hospitality und bayerisch inspirierte Signature Dishes."
    />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header reveal" data-site-header></header>

      <main>
        <section class="hero hero-subpage hero-subpage-menu reveal">
          <div class="hero-copy">
            <p class="eyebrow">Menükarte</p>
            <h1>Tradition, Datenfluss und ein Hang zur Inszenierung.</h1>
            <p class="lead">
              Unsere Karte spielt mit vertrauten bayerischen Geschmacksbildern, veredelt sie
              aber mit Präzision, Kontrast und einer klaren visuellen Handschrift.
            </p>
          </div>
          <div class="hero-media hero-media-menu glow-frame">
            <img
              src="assets/menu/bavarian-robotaste-signature-roast.png"
              alt="Signature Roast auf der Menükarte"
            />
          </div>
        </section>

        <div data-product-page="menu"></div>
      </main>

      <footer class="site-footer reveal" data-site-footer></footer>
    </div>

    <div class="dish-modal" id="dish-modal" hidden>
      <div class="dish-modal-backdrop" data-dish-close></div>
      <div class="dish-modal-panel" role="dialog" aria-modal="true" aria-labelledby="dish-modal-title">
        <button class="dish-modal-close" type="button" aria-label="Overlay schließen" data-dish-close>
          ×
        </button>
        <div class="dish-modal-hero">
          <div class="dish-modal-head">
            <p class="section-tag" id="dish-modal-category">Gericht</p>
            <h2 id="dish-modal-title">Gericht</h2>
            <p class="price-tag" id="dish-modal-price">CHF 0</p>
            <p class="dish-modal-copy" id="dish-modal-copy"></p>
          </div>
          <div class="dish-modal-image-wrap">
            <button class="dish-modal-image-button" type="button" aria-label="Bild groß anzeigen" data-dish-image-open>
              <span class="dish-modal-image-icon">[ ]</span>
              <img class="dish-modal-image" id="dish-modal-image" alt="" />
            </button>
          </div>
        </div>
        <div class="dish-modal-meta">
          <div>
            <h3 id="dish-modal-special-heading-1">Herkunft</h3>
            <p id="dish-modal-origin"></p>
            <h3 id="dish-modal-special-heading-2">Qualität</h3>
            <p id="dish-modal-quality"></p>
          </div>
          <blockquote class="dish-modal-quote">
            <p id="dish-modal-quote"></p>
            <footer id="dish-modal-author"></footer>
          </blockquote>
        </div>
      </div>
    </div>

    <div class="image-lightbox" id="image-lightbox" hidden>
      <div class="image-lightbox-backdrop" data-image-close></div>
      <div class="image-lightbox-panel">
        <button class="dish-modal-close" type="button" aria-label="Großbild schließen" data-image-close>×</button>
        <img class="image-lightbox-image" id="image-lightbox-image" alt="" />
      </div>
    </div>

    <script src="scripts/layout.js"></script>
    <script src="scripts/main.js"></script>
  </body>
</html>
